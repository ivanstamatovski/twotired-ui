<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TwoTired Admin</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;
  --text:#f0f0f0;--text-dim:#888;--text-muted:#555;
  --accent:#f97316;--accent-dim:rgba(249,115,22,.15);--accent-hover:#ea6c0a;
  --red:#ef4444;--green:#22c55e;--blue:#3b82f6;
  --radius:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased}

/* ── Login ── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:400px}
.login-logo{font-size:28px;font-weight:800;color:var(--accent);letter-spacing:-1px;margin-bottom:6px}
.login-sub{color:var(--text-dim);font-size:13px;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text-muted)}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px}
.btn:hover{background:var(--accent-hover)}
.btn:disabled{opacity:.5;cursor:default}
.login-err{color:var(--red);font-size:13px;margin-top:12px;display:none}

/* ── Shell ── */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.topbar-logo{font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.topbar-label{font-size:12px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 7px}
.topbar-spacer{flex:1}
.topbar-user{font-size:12px;color:var(--text-dim)}
.logout-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);padding:5px 10px;font-size:12px;cursor:pointer;transition:border-color .15s}
.logout-btn:hover{border-color:var(--text-dim)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--text-dim);font-size:13px;font-weight:500;transition:background .12s,color .12s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;border-radius:10px;font-size:11px;font-weight:700;padding:1px 7px;min-width:20px;text-align:center}
.content{flex:1;overflow-y:auto;padding:28px}
.panel{display:none}
.panel.active{display:block}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-value{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:5px}
.stat-accent{color:var(--accent)}

/* ── Section header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:700;color:var(--text)}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);padding:5px 12px;font-size:12px;cursor:pointer;transition:border-color .15s}
.refresh-btn:hover{border-color:var(--text-dim);color:var(--text)}

/* ── Table ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;font-size:13px;color:var(--text-dim);border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.cell-main{color:var(--text);font-weight:500}
.cell-mono{font-family:'SF Mono',Menlo,monospace;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.badge-orange{background:var(--accent-dim);color:var(--accent)}
.badge-gray{background:var(--surface2);color:var(--text-muted)}

/* ── Bug detail ── */
.bug-comment{color:var(--text);font-style:italic;margin-bottom:4px}
.bug-query{font-size:11px;color:var(--text-muted)}
.bug-route{font-size:11px;color:var(--accent)}

/* ── Empty / loading ── */
.empty{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty-icon{font-size:36px;margin-bottom:12px}
.loading-row td{text-align:center;color:var(--text-muted);padding:32px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Expandable bug detail ── */
.expand-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text-muted);padding:3px 8px;font-size:11px;cursor:pointer;white-space:nowrap}
.expand-btn:hover{border-color:var(--accent);color:var(--accent)}
.detail-row{display:none;background:var(--surface2)}
.detail-row.open{display:table-row}
.detail-cell{padding:12px 16px 16px;border-bottom:1px solid var(--border)}
.detail-block{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--text-dim);white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;margin-top:8px}
.detail-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:10px}
.detail-label:first-child{margin-top:0}
</style>
</head>
<body>

<!-- ── Login ─────────────────────────────────────────── -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">TwoTired</div>
    <div class="login-sub">Admin Portal — internal access only</div>
    <div class="field">
      <label>Admin Password</label>
      <input id="inp-pass" type="password" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <div class="field">
      <label>Supabase Service Role Key</label>
      <input id="inp-key" type="password" placeholder="eyJ..." autocomplete="off"/>
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err">Incorrect password or key.</div>
  </div>
</div>

<!-- ── App shell ──────────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">TwoTired</div>
    <div class="topbar-label">Admin</div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user" id="topbar-user"></div>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </div>
  <div class="main">
    <div class="sidebar">
      <button class="nav-item active" onclick="showPanel('bugs',this)">
        <span class="nav-icon">🐛</span> Bug Reports
        <span class="nav-badge" id="badge-bugs">—</span>
      </button>
      <button class="nav-item" onclick="showPanel('users',this)">
        <span class="nav-icon">👥</span> Users
        <span class="nav-badge" id="badge-users">—</span>
      </button>
      <button class="nav-item" onclick="showPanel('routes',this)">
        <span class="nav-icon">🏍️</span> Routes
        <span class="nav-badge" id="badge-routes">—</span>
      </button>
    </div>
    <div class="content">

      <!-- ── Bug Reports Panel ── -->
      <div class="panel active" id="panel-bugs">
        <div class="stats-row" id="bug-stats"></div>
        <div class="section-header">
          <div class="section-title">Bug Reports &amp; Feedback</div>
          <button class="refresh-btn" onclick="loadBugs()">↻ Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Time</th><th>User</th><th>Comment</th><th>Route</th><th></th>
            </tr></thead>
            <tbody id="bugs-body"><tr class="loading-row"><td colspan="5"><span class="spinner"></span>Loading…</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- ── Users Panel ── -->
      <div class="panel" id="panel-users">
        <div class="stats-row" id="user-stats"></div>
        <div class="section-header">
          <div class="section-title">Users</div>
          <button class="refresh-btn" onclick="loadUsers()">↻ Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Email</th><th>Joined</th><th>Last Sign In</th><th>Provider</th><th>Status</th>
            </tr></thead>
            <tbody id="users-body"><tr class="loading-row"><td colspan="5"><span class="spinner"></span>Loading…</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- ── Routes Panel ── -->
      <div class="panel" id="panel-routes">
        <div class="stats-row" id="route-stats"></div>
        <div class="section-header">
          <div class="section-title">Generated Routes</div>
          <button class="refresh-btn" onclick="loadRoutes()">↻ Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Destination</th><th>Distance</th><th>Duration</th><th>Group</th><th>Score</th><th>Created</th>
            </tr></thead>
            <tbody id="routes-body"><tr class="loading-row"><td colspan="6"><span class="spinner"></span>Loading…</td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://ujvfwzcjgxupvtiwllhw.supabase.co';
const ADMIN_PASSWORD = 'TwoTired2026!'; // change this to your preferred password

let SERVICE_KEY = '';

// ── Auth ──────────────────────────────────────────────────────────────────────
function doLogin() {
  const pass = document.getElementById('inp-pass').value;
  const key  = document.getElementById('inp-key').value.trim();
  const err  = document.getElementById('login-err');
  err.style.display = 'none';
  if (pass !== ADMIN_PASSWORD || !key.startsWith('eyJ')) {
    err.style.display = 'block';
    return;
  }
  SERVICE_KEY = key;
  sessionStorage.setItem('tt_admin_key', key);
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadAll();
}

function doLogout() {
  sessionStorage.removeItem('tt_admin_key');
  SERVICE_KEY = '';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('inp-pass').value = '';
  document.getElementById('inp-key').value = '';
}

// Auto-login if key is in sessionStorage
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('tt_admin_key');
  if (saved) {
    SERVICE_KEY = saved;
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadAll();
  }
  document.getElementById('inp-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('inp-key').addEventListener('keydown',  e => { if(e.key==='Enter') doLogin(); });
});

// ── Navigation ────────────────────────────────────────────────────────────────
function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Fetch helper ─────────────────────────────────────────────────────────────
async function sb(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      'apikey': SERVICE_KEY,
      'Authorization': 'Bearer ' + SERVICE_KEY,
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Load all ─────────────────────────────────────────────────────────────────
function loadAll() { loadBugs(); loadUsers(); loadRoutes(); }

// ── Formatters ────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
    + ' ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}
function fmtDateShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function timeSince(iso) {
  if (!iso) return '—';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)  return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function statCard(value, label, accent=false) {
  return `<div class="stat-card"><div class="stat-value ${accent?'stat-accent':''}">${value}</div><div class="stat-label">${label}</div></div>`;
}

// ── Bug Reports ───────────────────────────────────────────────────────────────
async function loadBugs() {
  const tbody = document.getElementById('bugs-body');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="5"><span class="spinner"></span>Loading…</td></tr>';
  try {
    const data = await sb('/rest/v1/bug_reports?select=*&order=created_at.desc&limit=200');
    document.getElementById('badge-bugs').textContent = data.length;

    // Stats
    const today = data.filter(r => new Date(r.created_at) > new Date(Date.now()-86400000)).length;
    const week  = data.filter(r => new Date(r.created_at) > new Date(Date.now()-7*86400000)).length;
    document.getElementById('bug-stats').innerHTML =
      statCard(data.length, 'Total Reports') +
      statCard(today, 'Last 24h', today>0) +
      statCard(week,  'Last 7 days');

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty"><div class="empty-icon">🎉</div>No bug reports yet</div></td></tr>';
      return;
    }

    tbody.innerHTML = data.map((r,i) => {
      const comment = r.comment || r.p_comment || '';
      const query   = r.query   || r.p_query  || '';
      const routeTitle = r.route_data?.title || r.p_route_data?.title || '';
      const userId  = r.user_id ? r.user_id.slice(0,8)+'…' : 'anon';
      const hasDetail = query || routeTitle || r.route_data || r.p_route_data;
      const routeJson = JSON.stringify(r.route_data || r.p_route_data || {}, null, 2);
      return `
        <tr>
          <td class="cell-mono">${timeSince(r.created_at)}<br><span style="font-size:10px;color:var(--text-muted)">${fmtDate(r.created_at)}</span></td>
          <td><span class="cell-mono" style="font-size:11px">${userId}</span></td>
          <td><div class="bug-comment">${comment || '<span style="color:var(--text-muted)">—</span>'}</div>${query ? `<div class="bug-query">Query: "${query}"</div>` : ''}</td>
          <td>${routeTitle ? `<span class="bug-route">${routeTitle}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
          <td>${hasDetail ? `<button class="expand-btn" onclick="toggleDetail(${i})">Details</button>` : ''}</td>
        </tr>
        <tr class="detail-row" id="detail-${i}">
          <td class="detail-cell" colspan="5">
            ${query ? `<div class="detail-label">Route Query</div><div class="detail-block">${escHtml(query)}</div>` : ''}
            ${routeJson !== '{}' ? `<div class="detail-label">Route Data</div><div class="detail-block">${escHtml(routeJson)}</div>` : ''}
          </td>
        </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5" style="color:var(--red);padding:24px">${e.message}</td></tr>`;
  }
}

function toggleDetail(i) {
  const row = document.getElementById('detail-' + i);
  row.classList.toggle('open');
}

// ── Users ─────────────────────────────────────────────────────────────────────
async function loadUsers() {
  const tbody = document.getElementById('users-body');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="5"><span class="spinner"></span>Loading…</td></tr>';
  try {
    const data = await sb('/auth/v1/admin/users?per_page=500');
    const users = data.users || data;
    document.getElementById('badge-users').textContent = users.length;

    const today = users.filter(u => new Date(u.created_at) > new Date(Date.now()-86400000)).length;
    const week  = users.filter(u => new Date(u.created_at) > new Date(Date.now()-7*86400000)).length;
    const confirmed = users.filter(u => u.email_confirmed_at || u.confirmed_at).length;
    document.getElementById('user-stats').innerHTML =
      statCard(users.length, 'Total Users') +
      statCard(confirmed, 'Confirmed') +
      statCard(today, 'Joined Today', today>0) +
      statCard(week, 'Joined This Week');

    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty"><div class="empty-icon">👻</div>No users yet</div></td></tr>';
      return;
    }

    // Sort newest first
    users.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

    tbody.innerHTML = users.map(u => {
      const provider  = u.app_metadata?.provider || 'email';
      const confirmed = u.email_confirmed_at || u.confirmed_at;
      const lastSeen  = u.last_sign_in_at;
      return `
        <tr>
          <td class="cell-main">${u.email || '—'}</td>
          <td class="cell-mono" style="font-size:12px">${fmtDateShort(u.created_at)}</td>
          <td class="cell-mono" style="font-size:12px">${lastSeen ? timeSince(lastSeen) : '—'}</td>
          <td><span class="badge ${provider==='google'?'badge-blue':'badge-gray'}">${provider}</span></td>
          <td><span class="badge ${confirmed?'badge-green':'badge-gray'}">${confirmed?'confirmed':'pending'}</span></td>
        </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5" style="color:var(--red);padding:24px">${e.message}</td></tr>`;
  }
}

// ── Routes ────────────────────────────────────────────────────────────────────
async function loadRoutes() {
  const tbody = document.getElementById('routes-body');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="6"><span class="spinner"></span>Loading…</td></tr>';
  try {
    const data = await sb('/rest/v1/routes?select=id,title,destination,distance_mi,duration_str,group_name,community_score,is_stale,created_at&order=created_at.desc&limit=300');
    document.getElementById('badge-routes').textContent = data.length;

    const today  = data.filter(r => r.created_at && new Date(r.created_at) > new Date(Date.now()-86400000)).length;
    const week   = data.filter(r => r.created_at && new Date(r.created_at) > new Date(Date.now()-7*86400000)).length;
    const totalMi = data.reduce((s,r) => s + (r.distance_mi||0), 0);
    document.getElementById('route-stats').innerHTML =
      statCard(data.length, 'Total Routes') +
      statCard(today, 'Today', today>0) +
      statCard(week,  'This Week') +
      statCard(Math.round(totalMi).toLocaleString() + ' mi', 'Total Miles Routed', true);

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty"><div class="empty-icon">🗺️</div>No routes yet</div></td></tr>';
      return;
    }

    tbody.innerHTML = data.map(r => {
      const score = r.community_score || 0;
      return `
        <tr>
          <td class="cell-main">${r.destination || r.title || '—'}</td>
          <td>${r.distance_mi ? r.distance_mi.toFixed(1) + ' mi' : '—'}</td>
          <td>${r.duration_str || '—'}</td>
          <td><span class="badge badge-gray">${r.group_name || 'AI'}</span></td>
          <td>${score > 0 ? `<span class="badge badge-orange">${score}</span>` : '<span style="color:var(--text-muted)">0</span>'}</td>
          <td class="cell-mono" style="font-size:11px">${r.created_at ? timeSince(r.created_at) : '—'}</td>
        </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:var(--red);padding:24px">${e.message}</td></tr>`;
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
